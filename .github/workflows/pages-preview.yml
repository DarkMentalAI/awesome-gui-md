name: Pages Preview

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: cloudflare-pages-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run ci
      - name: Block production branch
        if: github.ref_name == 'main'
        shell: bash
        run: |
          echo "Pages Preview is disabled on main until production CD is enabled."
          exit 1
      - name: Check Cloudflare configuration
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          missing=0
          for name in CF_API_TOKEN CF_ACCOUNT_ID CF_PROJECT; do
            if [ -z "${!name}" ]; then
              echo "$name is not configured"
              missing=1
            fi
          done
          exit "$missing"
      - name: Deploy Cloudflare Pages preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 3.114.17
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=preview-${{ github.run_id }}
