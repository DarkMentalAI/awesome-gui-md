name: Pages Production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to deploy
        required: true
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: cloudflare-pages-production
    runs-on: ubuntu-latest
    environment: cloudflare-pages-production
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="$RELEASE_EVENT_TAG"
          else
            tag="$MANUAL_TAG"
          fi
          if [ -z "$tag" ] || [ "${tag#-}" != "$tag" ]; then
            echo "Invalid release tag: $tag"
            exit 1
          fi
          if ! git check-ref-format "refs/tags/$tag"; then
            echo "Invalid release tag: $tag"
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
      - name: Confirm remote tag exists
        shell: bash
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          tag_ref="refs/tags/$TAG_NAME"
          if ! git check-ref-format "$tag_ref"; then
            echo "Invalid release tag: $TAG_NAME"
            exit 1
          fi
          git ls-remote --exit-code --tags "https://github.com/$GITHUB_REPOSITORY.git" "$tag_ref" > /dev/null
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          fetch-depth: 0
      - name: Confirm release target is on main
        shell: bash
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          target="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$target" refs/remotes/origin/main; then
            echo "Release target $target is not reachable from origin/main"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run ci
      - name: Check Cloudflare configuration
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          missing=0
          for name in CF_API_TOKEN CF_ACCOUNT_ID CF_PROJECT; do
            if [ -z "${!name}" ]; then
              echo "$name is not configured"
              missing=1
            fi
          done
          exit "$missing"
      - name: Deploy Cloudflare Pages production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 3.114.17
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main
